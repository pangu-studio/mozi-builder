name: Release Mozi CLI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（例如 0.1.2；手动运行只构建产物，不创建 GitHub Release）'
        required: true

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: windows
            goarch: arm64
            archive: zip
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${INPUT_VERSION#v}"
          fi
          name="mozi_${GOOS}_${GOARCH}"
          mkdir -p "dist/${name}"
          binary="mozi"
          if [[ "${GOOS}" == "windows" ]]; then binary="mozi.exe"; fi
          go build -trimpath \
            -ldflags "-s -w -X github.com/pangu-studio/mozi-builder/cmd/mozi/cmd.version=${version}" \
            -o "dist/${name}/${binary}" ./cmd/mozi
          cp LICENSE* "dist/${name}/" 2>/dev/null || true
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            (cd dist && zip -qr "${name}.zip" "${name}")
          else
            tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: mozi-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/mozi_*.${{ matrix.archive }}
          if-no-files-found: error

  release:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          pattern: mozi-*
          path: dist
          merge-multiple: true
      - name: Create checksums
        run: |
          cd dist
          sha256sum mozi_* > checksums.txt
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists; replacing release assets"
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/* \
              --verify-tag \
              --generate-notes \
              --title "Mozi ${GITHUB_REF_NAME}"
          fi
